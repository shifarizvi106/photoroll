<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Photo Roll</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@300;400&display=swap" rel="stylesheet" />
  
  <style>
    *, *::before, *::after { 
      box-sizing: border-box; 
      margin: 0; 
      padding: 0; 
    }
    
    :root {
      --bg:        #f2c7da;
      --bg-box:    #eda4c3;
      --text:      #a32e61;
      --accent:    #f5dfc4;
      --border:    #fab4c9;
      --muted:     #9c435d;
    }

    /* Center the film roll beautifully on your pink background */
    body {
      background-color: var(--bg);
      font-family: 'Jost', sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px 0;
      overflow-x: hidden;
    }

    /* Outer wrapper acting as the solid film strip chassis */
    .film-container {
      position: relative;
      width: 100%;
      max-width: 900px;
      background: #0d0d0d;
      padding: 40px 0;
      overflow: hidden;
      box-shadow: 0 25px 50px -12px rgba(163, 46, 97, 0.4); /* Colored shadow matching your theme */
      border-radius: 4px;
    }

    /* Realistic continuous sprocket holes */
    .sprockets {
      position: absolute;
      left: 0;
      width: 200%; /* Spans wide to cover the moving track background */
      height: 14px;
      background-image: radial-gradient(circle, var(--bg) 60%, transparent 65%);
      background-size: 24px 14px;
      animation: sprocketMove 20s linear infinite;
    }
    .sprockets.top { top: 12px; }
    .sprockets.bottom { bottom: 12px; }

    /* Flex track holding the actual images */
    .film-track {
      display: flex;
      width: max-content;
      animation: rollAnimation 20s linear infinite;
    }

    /* Individual film frame cells with thin vertical gaps */
    .frame {
      width: 300px;
      height: 200px;
      margin-right: 16px; /* Space between photos */
      background: #000;
      border-left: 2px solid #1a1a1a;
      border-right: 2px solid #1a1a1a;
    }

    /* Image styling with a slight vintage analog tint */
    .frame img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: sepia(0.15) contrast(1.05) brightness(0.95);
      display: block;
    }

    /* Vignette overlay mimicking a curved 3D lens or reel depth */
    .film-shadow {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      background: linear-gradient(to right, 
        rgba(0,0,0,0.95) 0%, 
        rgba(0,0,0,0) 15%, 
        rgba(0,0,0,0) 85%, 
        rgba(0,0,0,0.95) 100
      );
    }

    /* Keyframes for flawless continuous motion */
    @keyframes rollAnimation {
      0% { transform: translateX(0); }
      100% { transform: translateX(calc(-300px * 4 - 64px)); } /* 4 frames + 4 margins of 16px */
    }

    @keyframes sprocketMove {
      0% { transform: translateX(0); }
      100% { transform: translateX(calc(-300px * 4 - 64px)); }
    }
  </style>
</head>
<body>

  <div class="film-container">
    <!-- Top and bottom sprocket borders running along the entire track -->
    <div class="sprockets top"></div>
    
    <div class="film-track">
      <div class="frame"><img src="https://picsum.photos" alt="Photo 1"></div>
      <div class="frame"><img src="https://picsum.photos" alt="Photo 2"></div>
      <div class="frame"><img src="https://picsum.photos" alt="Photo 3"></div>
      <div class="frame"><img src="https://picsum.photos" alt="Photo 4"></div>
      
      <!-- Duplicate images for seamless infinite scroll -->
      <div class="frame"><img src="https://picsum.photos" alt="Photo 1"></div>
      <div class="frame"><img src="https://picsum.photos" alt="Photo 2"></div>
      <div class="frame"><img src="https://picsum.photos" alt="Photo 3"></div>
      <div class="frame"><img src="https://picsum.photos" alt="Photo 4"></div>
    </div>
    
    <div class="sprockets bottom"></div>
    <!-- 3D Shadow overlay to create depth on the edges -->
    <div class="film-shadow"></div>
  </div>

</body>
</html>
